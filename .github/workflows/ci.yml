name: CI — SmartStay Intelligence

on:
  push:

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    env:
      PYTHONUTF8: "1"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
      POSTGRES_PORT: "5432"
      SMARTSTAY_DB: SmartStayAi
      AIRFLOW_DB: airflow
      secret: test_secret_key_for_ci

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "0000"
          POSTGRES_DB: SmartStayAi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Create DB tables and seed test user
        run: |
          uv run python -c "
          import sys; sys.path.insert(0, 'backend')
          from app.db.session import engine
          from app.models.user import User
          from sqlalchemy.orm import declarative_base
          from app.db.session import Base
          Base.metadata.create_all(bind=engine)
          from app.db.session import SessionLocal
          from app.core.security import hash_password
          db = SessionLocal()
          if not db.query(User).filter(User.username == 'test').first():
              db.add(User(username='test', email='test@smartstay.com', password=hash_password('12345678')))
              db.commit()
          db.close()
          print('DB seeded')
          "

      - name: Run pytest (API tests only — model files not available in CI)
        run: |
          uv run pytest tests/test_api.py -v --tb=short
