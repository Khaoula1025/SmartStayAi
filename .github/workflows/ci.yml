name: CI — SmartStay Intelligence

on:
  push:

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "0000"
          POSTGRES_DB: SmartStayAi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Create backend/.env for CI
        run: |
          cat > backend/.env << 'ENVEOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=0000
          POSTGRES_PORT=5432
          SMARTSTAY_DB=SmartStayAi
          AIRFLOW_DB=airflow
          AIRFLOW_ADMIN_USER=admin
          AIRFLOW_ADMIN_PASSWORD=admin123
          AIRFLOW_FERNET_KEY=ci_fernet_key
          AIRFLOW_SECRET_KEY=ci_secret_key
          GOOGLE_API_KEY=ci_placeholder
          APIFY_TOKEN=ci_placeholder
          secret=test_secret_key_for_ci
          ENVEOF

      - name: Create DB tables and seed test user
        run: |
          uv run python -c "
          import sys; sys.path.insert(0, 'backend')
          from app.db.session import engine, Base, SessionLocal
          from app.models.user import User
          from app.core.security import hash_password
          Base.metadata.create_all(bind=engine)
          db = SessionLocal()
          if not db.query(User).filter(User.username == 'test').first():
              db.add(User(username='test', email='test@smartstay.com', password=hash_password('12345678')))
              db.commit()
          db.close()
          print('DB seeded successfully')
          "

      - name: Run pytest
        run: |
          PYTHONUTF8=1 uv run pytest tests/test_api.py -v --tb=short
