x-airflow-common: &airflow-common
  build:
    context: ./airflow          # ← your airflow/ folder
    dockerfile: Dockerfile
  environment: &airflow-env
    # ── Airflow core ────────────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

    # ── Airflow metadata DB ──────────────────────────────────────────────
    # Points at your LOCAL postgres (host.docker.internal = localhost from container)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:${POSTGRES_PORT}/${AIRFLOW_DB}

    # ── Airflow webserver ────────────────────────────────────────────────
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

    # ── Airflow admin user (used by airflow-init) ────────────────────────
    _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
    _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}

    # ── SmartStay paths inside the container ────────────────────────────
    SMARTSTAY_PROJECT_ROOT: /opt/smartstay
    RAW_DIR:        /opt/smartstay/data/raw
    PROCESSED_DIR:  /opt/smartstay/data/processed
    PREDICTION_DIR: /opt/smartstay/data/prediction
    MODELS_DIR:     /opt/smartstay/data/models
    LOGS_DIR:       /opt/smartstay/logs/pipeline

    # ── SmartStay DB (your local postgres, same host trick) ──────────────
    DB_HOST:     host.docker.internal
    DB_PORT:     ${POSTGRES_PORT}
    DB_NAME:     ${SMARTSTAY_DB}
    DB_USER:     ${POSTGRES_USER}
    DB_PASSWORD: ${POSTGRES_PASSWORD}

    # ── Python path so config.py + scripts/ are importable ──────────────
    PYTHONPATH: /opt/smartstay

    # ── Logging ──────────────────────────────────────────────────────────
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__LOG_LEVEL: INFO

  volumes:
    # Project root mounted at /opt/smartstay (read-only — source code)
    - .:/opt/smartstay:ro

    # Data folder is read-write (scripts write CSVs, models here)
    - ./data:/opt/smartstay/data

    # DAGs — your airflow/dags/ folder
    - ./airflow/dags:/opt/airflow/dags

    # Airflow task logs
    - ./logs/airflow:/opt/airflow/logs

    # Plugins (empty for now)
    - ./airflow/plugins:/opt/airflow/plugins

  extra_hosts:
    # Makes "host.docker.internal" resolve to your machine's localhost
    # Required on Linux. Works out of the box on Mac/Windows Docker Desktop.
    - "host.docker.internal:host-gateway"


services:

  # ── Airflow init (runs once then exits) ──────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: smartstay-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for database..."
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname SmartStay \
          --role Admin \
          --email "admin@smartstay.local" || true
        airflow variables set SMARTSTAY_PROJECT_ROOT /opt/smartstay || true
        echo "✅ Airflow init complete"
    restart: "no"

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: smartstay-airflow-webserver
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: smartstay-airflow-scheduler
    restart: unless-stopped
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully


# No postgres volume needed — using your local postgres